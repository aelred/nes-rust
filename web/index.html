<html>

<head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        @media (pointer: fine) {
            .mobile {
                display: none;
            }
        }

        @media not (pointer: fine) {
            .desktop {
                display: none;
            }
        }

        .mobile {
            font-size: xx-large;
        }

        body {
            background-color: #0d0c0c;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #canvas {
            object-fit: contain;
            image-rendering: pixelated;
            overflow: auto;
        }

        p {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: #ffffff;
            text-align: center;
        }

        a {
            color: #dd2020
        }

        .key {
            color: #e5e5e5
        }

        .button-text {
            color: #a5a2a2
        }

        #controller {
            object-fit: contian;
            overflow: auto;
            user-select: none;
        }
    </style>
</head>

<body>
<script type="module">
    import init, {run} from "./nes_rust.js";

    async function start() {
        await init();
        run();
    }

    start();
</script>

<div id="container">
    <canvas height="240" id="canvas" width="256">
    </canvas>
    <svg class="mobile" id="controller" viewBox="5 0 90 46">
        <rect fill="#e5e5e5" height="46" rx="2" width="100"/>
        <rect fill="#0d0c0c" height="38" rx="1" width="94" x="3" y="5"/>
        <!-- Left -->
        <rect fill="#e5e5e5" height="10" rx="1" width="24" x="7" y="20"/>
        <rect fill="#e5e5e5" height="24" rx="1" width="10" x="14" y="13"/>
        <rect fill="#0d0c0c" height="8" rx="1" width="22" x="8" y="21"/>
        <rect fill="#0d0c0c" height="22" rx="1" width="8" x="15" y="14"/>

        <rect height="10" id="left" pointer-events="all" visibility="hidden" width="10" x="7" y="20"/>
        <rect height="10" id="right" pointer-events="all" visibility="hidden" width="10" x="21" y="20"/>
        <rect height="10" id="up" pointer-events="all" visibility="hidden" width="10" x="14" y="13"/>
        <rect height="10" id="down" pointer-events="all" visibility="hidden" width="10" x="14" y="27"/>
        <!-- Middle -->
        <rect fill="#a5a2a2" height="1" rx="0" width="28" x="36" y="5"/>
        <rect fill="#a5a2a2" height="5" rx="1" width="28" x="36" y="5"/>
        <rect fill="#a5a2a2" height="5" rx="1" width="28" x="36" y="12"/>
        <rect fill="#a5a2a2" height="5" rx="1" width="28" x="36" y="19"/>
        <text fill="#dd2020" font-family="monospace" font-size="2.5" text-anchor="middle" x="44.5"
              y="22.4">SELECT
        </text>
        <text fill="#dd2020" font-family="monospace" font-size="2.5" text-anchor="middle" x="55.5"
              y="22.4">START
        </text>
        <rect fill="#e5e5e5" height="10" rx="1" width="28" x="36" y="26"/>
        <rect fill="#0d0c0c" height="3" id="select" rx="2" width="9" x="40" y="30"/>
        <rect fill="#0d0c0c" height="3" id="start" rx="2" width="9" x="51" y="30"/>
        <rect fill="#a5a2a2" height="5" rx="1" width="28" x="36" y="38"/>
        <rect fill="#a5a2a2" height="4" rx="0" width="28" x="36" y="39"/>
        <!-- Right -->
        <rect fill="#e5e5e5" height="10" rx="1" width="10" x="68" y="27"/>
        <circle cx="73" cy="32" fill="#dd2020" id="b" r="4"/>
        <text fill="#dd2020" font-family="monospace" font-size="2.5" text-anchor="middle" x="77" y="40">B</text>
        <rect fill="#e5e5e5" height="10" rx="1" width="10" x="81" y="27"/>
        <circle cx="86" cy="32" fill="#dd2020" id="a" r="4"/>
        <text fill="#dd2020" font-family="monospace" font-size="2.5" text-anchor="middle" x="90" y="40">A</text>
    </svg>
    <p>
        <input accept=".nes, .zip" id="upload-rom" type="file"/>
    </p>
    <p>
        This is a <a
            href="https://www.nintendo.com/en-gb/Hardware/Nintendo-History/Nintendo-Entertainment-System/Nintendo-Entertainment-System-627024.html">NES</a>
        emulator. Select or drag-and-drop a .nes or .zip file to play it, e.g. the <a
            href="https://eldenpixels.itch.io/alwas-awakening-the-8-bit-edition#:~:text=944%20kB-,Download%20demo,-Download">Alwa's
        Awakening demo</a>!
    </p>
    <p class="desktop">
        Controls:&nbsp;
        <span class=key>Z</span> = <span class=button>A</span>,&nbsp;
        <span class=key>X</span> = <span class=button>B</span>,&nbsp;
        <span class=key>Arrows</span> = <span class=button>D-Pad</span>,&nbsp;
        <span class=key>Enter</span> = <span class=button> Start</span>,&nbsp;
        <span class=key>Shift</span> = <span class=button>Select</span>
    </p>
    <p>
        <a href="https://github.com/aelred/nes-rust">GitHub</a>
    </p>
</div>
</body>

</html>
